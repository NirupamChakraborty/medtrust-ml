<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>DISEASE PREDICTION POWERED BY MEDTRUST</title>

<style>
body {
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #dbeafe, #c7d2fe);
    margin: 0;
    padding: 0;
}

/* CENTER WRAPPER */
.wrapper {
    display: flex;
    flex-direction: column;
    align-items: center;
}

/* MAIN CARD */
.container {
    margin-top: 60px;
    background: #f8fafc;
    padding: 40px;
    border-radius: 20px;
    width: 520px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.2);
    text-align: center;
}

/* LOGO */
.logo img {
    width: 80px;
    margin-bottom: 10px;
}

/* HEADER */
h1 {
    color: #1e3c72;
    font-size: 26px;
    margin: 5px 0;
    font-weight: 700;
}

.sub {
    color: #555;
    margin-bottom: 20px;
}

.sub span {
    color: #2a5298;
    font-weight: bold;
}

/* DIVIDER */
.divider {
    margin: 15px 0 25px;
    height: 2px;
    background: linear-gradient(to right, transparent, #2a5298, transparent);
}

/* TEXTAREA */
textarea {
    width: 100%;
    height: 120px;
    padding: 15px;
    border-radius: 12px;
    border: 1px solid #cbd5e1;
    font-size: 14px;
    outline: none;
}

textarea:focus {
    border-color: #2a5298;
    box-shadow: 0 0 8px rgba(42,82,152,0.3);
}

/* BUTTON */
button {
    margin-top: 18px;
    width: 100%;
    padding: 14px;
    border-radius: 12px;
    border: none;
    background: linear-gradient(135deg, #22c55e, #16a34a);
    color: white;
    font-size: 16px;
    cursor: pointer;
}

button:hover {
    transform: scale(1.03);
    box-shadow: 0 8px 20px rgba(0,0,0,0.2);
}

/* RESULT */
.result {
    margin-top: 25px;
    padding: 20px;
    border-radius: 15px;
    background: #ecfdf5;
    border: 1px solid #bbf7d0;
    display: flex;
    gap: 15px;
    text-align: left;
}

.result-text b {
    color: #16a34a;
}

.confidence {
    color: #1e3c72;
    font-weight: bold;
}

/* DISCLAIMER */
.disclaimer {
    margin-top: 40px;
    width: 520px;
    padding: 20px;
    border-radius: 15px;
    background: linear-gradient(135deg, #1e40af, #2563eb);
    color: white;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}

.disclaimer-text b {
    display: block;
    margin-bottom: 5px;
}
</style>
</head>

<body>

<div class="wrapper">

<div class="container">

    <!-- LOGO -->
    <div class="logo">
        <img src="{{ url_for('static', filename='logo.jpeg') }}" alt="Logo">
    </div>

    <h1>DISEASE PREDICTION</h1>
    <div class="sub">POWERED BY <span>MEDTRUST</span></div>

    <div class="divider"></div>

    <form action="/predict" method="post">
        <textarea name="symptoms" placeholder="Enter symptoms in detail...">{{ symptoms if symptoms else '' }}</textarea>
        <button type="submit">🔍 Predict Disease</button>
    </form>

    {% if prediction %}
    <div class="result">
        <div class="result-text">
            <div>Predicted Disease: <b>{{ prediction }}</b></div>
            <div class="confidence">Confidence: {{ "%.2f"|format(confidence) }}%</div>
        </div>
    </div>
    {% endif %}

</div>

<div class="disclaimer">
    <div class="disclaimer-text">
        <b>Disclaimer</b>
        This model is for informational purposes only and not a substitute for professional medical advice.
    </div>
</div>

</div>

</body>
</html>
